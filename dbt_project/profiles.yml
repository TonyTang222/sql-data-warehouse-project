data_warehouse:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_HOST', '127.0.0.1') }}"
      port: "{{ env_var('DBT_PORT', '5433') | int }}"
      user: "{{ env_var('DBT_USER') }}"
      pass: "{{ env_var('DBT_PASS') }}"
      dbname: "{{ env_var('DBT_DBNAME', 'data_warehouse') }}"
      schema: public
      threads: 4
